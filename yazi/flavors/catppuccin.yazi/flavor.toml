[filetype]
rules = [
  { mime = "image/*", fg = "#f9e2af" },
  { mime = "video/*", fg = "#f9e2af" },
  { mime = "audio/*", fg = "#f5c2e7" },
  { mime = "application/{pdf,doc,rtf}", fg = "#89b4fa" },

  # Archives
  { mime = "application/*zip", fg = "#7f849c" },
  { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", fg = "#7f849c" },

  # Virtual file system
  { mime = "vfs/{absent,stale}", fg = "#45475a" },

  # Special files
  { url = "*", is = "orphan", fg = "#f38ba8" },
  { url = "*", is = "exec", fg = "#a6e3a1" },
  { url = "*", is = "dummy", fg = "#f38ba8" },
  { url = "*/", is = "dummy", fg = "#f38ba8" },

  { url = "*.config/", fg = "#fab387" },
  { url = "*.local/", fg = "#fab387" },
  { url = "*.git/", fg = "#fab387" },
  { url = "*Documents/", fg = "#fab387" },
  { url = "*Downloads/", fg = "#fab387" },
  { url = "*Music/", fg = "#fab387" },
  { url = "*Pictures/", fg = "#fab387" },
  { url = "*Public/", fg = "#fab387" },
  { url = "*Videos/", fg = "#fab387" },
  { url = "*.md", fg = "#89b4fa" },

  # Fallback
  { url = "*", fg = "#bac2de" },
  { url = "*/", fg = "#cba6f7" },
]


